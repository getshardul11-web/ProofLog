<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="core" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#E8920A"/>
    </radialGradient>
  </defs>

  <!-- Glow halo -->
  <circle cx="32" cy="32" r="26" fill="#F4C430" opacity="0.10"/>

  <!-- Central pollen body -->
  <circle cx="32" cy="32" r="10" fill="url(#core)"/>
  <!-- Specular highlight -->
  <circle cx="28" cy="27" r="3.5" fill="white" opacity="0.28"/>

  <!-- 4 cardinal spike particles -->
  <circle cx="32" cy="15" r="2.8" fill="#F4C430"/>
  <circle cx="49" cy="32" r="2.8" fill="#F4C430"/>
  <circle cx="32" cy="49" r="2.8" fill="#F4C430"/>
  <circle cx="15" cy="32" r="2.8" fill="#F4C430"/>

  <!-- 4 diagonal particles -->
  <circle cx="45" cy="19" r="2.2" fill="#F4C430" opacity="0.88"/>
  <circle cx="45" cy="45" r="2.2" fill="#F4C430" opacity="0.78"/>
  <circle cx="19" cy="45" r="2.2" fill="#F4C430" opacity="0.82"/>
  <circle cx="19" cy="19" r="2.2" fill="#F4C430" opacity="0.88"/>

  <!-- Dashed orbit ring -->
  <circle cx="32" cy="32" r="19" stroke="#F4C430" stroke-width="1.4" stroke-dasharray="3 4" opacity="0.45" fill="none"/>
</svg>
