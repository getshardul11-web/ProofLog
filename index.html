<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#F4C430" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pollen" />
  <title>Pollen | Work Proof, Organized</title>
  <meta name="description"
    content="Pollen is a work-proof journaling app that helps you log daily work with proof and generate weekly reports using AI." />

  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Apply dark mode before first paint to prevent flash
    if (localStorage.getItem('prooflog-dark-mode') === 'true') {
      document.documentElement.classList.add('dark');
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #f7f7f5;
    }
    html.dark body {
      background: #191919;
      color: #e2e8f0;
    }

    /* Premium scrollbar */
    ::-webkit-scrollbar {
      width: 9px;
      height: 9px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.35);
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.45);
    }

    /* Optional glass helper */
    .glass-panel {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(226, 232, 240, 0.7);
    }

    /* Ensure app fills viewport */
    #root {
      position: relative;
      z-index: 10;
    }
  </style>



  <link rel="stylesheet" href="/index.css" />
</head>

<body class="text-slate-900 overflow-x-hidden bg-[#f7f7f5] dark:bg-[#191919]">
  <div id="root"></div>

  <script type="module" src="/index.tsx"></script>
</body>

</html>
